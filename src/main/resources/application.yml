spring:
  application:
    name: tennis-court-booking

  # 统一强制 UTF-8，避免中文在反向代理/浏览器解析时出现乱码
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/tennisbooking?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ch112211
    type: com.alibaba.druid.pool.DruidDataSource
    
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

# MyBatis 配置
mybatis:
  # mapper xml文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
  type-aliases-package: com.tennis_court_booking.pojo.entity
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启二级缓存
    cache-enabled: true
    # 开启懒加载
    lazy-loading-enabled: true
    # 积极加载
    aggressive-lazy-loading: false

# 日志配置
logging:
  level:
    com.tennis_court_booking.mapper: debug
    root: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# jwt配置
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24小时