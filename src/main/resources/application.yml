spring:
  application:
    name: tennis-court-booking



  # 统一强制 UTF-8，避免中文在反向代理/浏览器解析时出现乱码
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/tennisbooking?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ch112211
    type: com.alibaba.druid.pool.DruidDataSource
    
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-idle: 8        # 最大空闲连接
          min-idle: 0        # 最小空闲连接
          max-wait: 100ms     # 连接池获取连接最大等待时间

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # 重试耗尽后不再 requeue，配合队列 DLX 进入死信队列
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2.0
        acknowledge-mode: auto


# MyBatis 配置
mybatis:
  # mapper xml文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径
  type-aliases-package: com.tennis_court_booking.pojo.entity
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启二级缓存
    cache-enabled: true
    # 开启懒加载
    lazy-loading-enabled: true
    # 积极加载
    aggressive-lazy-loading: false

# 日志配置
logging:
  level:
    com.tennis_court_booking.mapper: debug
    # 打开后可看到场地缓存走 L1/L2/DB 的分支（[CourtCache] 日志）
    com.tennis_court_booking.cache: debug
    root: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# AI 异步任务补偿（DEAD/FAILED 重投次数上限，含用户与管理员触发）
ai:
  chat:
    compensation:
      max-attempts: 5

# jwt配置
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000 # 24小时

# AI 模型接入（OpenAI 兼容接口，示例使用通义千问兼容地址）
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_API_KEY:sk-6a0bd6c2051d4976a7f31be7cf701bb8}
      model-name: qwen-plus
      log-requests: true
      log-responses: true

