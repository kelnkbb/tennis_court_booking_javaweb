spring:
  application:
    name: tennis-court-booking




  # 统一强制 UTF-8，避免中文在反向代理/浏览器解析时出现乱码
  # 数据库配置（环境变量见项目根目录 env.example）
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tennisbooking?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:ch112211}
    type: com.alibaba.druid.pool.DruidDataSource
    
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,log4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: "${SPRING_DATA_REDIS_PASSWORD:}"
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8      # 最大连接数
          max-idle: 8        # 最大空闲连接
          min-idle: 0        # 最小空闲连接
          max-wait: 100ms     # 连接池获取连接最大等待时间

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # 重试耗尽后不再 requeue，配合队列 DLX 进入死信队列
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2.0
        acknowledge-mode: auto


# MyBatis 配置
mybatis:
  # mapper xml（与 resources 下实际路径一致）
  mapper-locations: classpath:com/tennis_court_booking/mapper/*.xml
  # 实体类包路径
  type-aliases-package: com.tennis_court_booking.pojo.entity,com.tennis_court_booking.cs.entity
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启二级缓存
    cache-enabled: true
    # 开启懒加载
    lazy-loading-enabled: true
    # 积极加载
    aggressive-lazy-loading: false

# 日志配置
logging:
  level:
    com.tennis_court_booking.mapper: debug
    # 打开后可看到场地缓存走 L1/L2/DB 的分支（[CourtCache] 日志）
    com.tennis_court_booking.cache: debug
    root: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 缓存一致性补偿：改库后删缓存失败时，通过 MQ 重试次数上限（TTL 仍作为最终兜底）
cache:
  consistency:
    max-attempts: 5

# WebSocket：系统类全站广播在 Redis 上的幂等窗口（秒），多实例共享
app:
  websocket:
    broadcast-idempotency-ttl-seconds: ${APP_WS_BROADCAST_IDEMP_TTL_SECONDS:604800}

# jwt配置
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时

# Stripe 在线支付（测试密钥见 https://dashboard.stripe.com/test/apikeys ）
# Webhook 需在 Dashboard 创建端点：URL = https://你的域名/api/payments/stripe/webhook，并复制签名密钥
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/my-bookings?stripe=success}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/my-bookings?stripe=cancel}
  currency: cny

# AI 模型接入（OpenAI 兼容接口，示例使用通义千问兼容地址）
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_API_KEY:}
      model-name: qwen-plus
      log-requests: true
      log-responses: true
    # RAG 向量化：与 chat 同兼容网关；模型需与 ai.rag.embedding-dimension 一致（text-embedding-v2 为 1536 维）
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${AI_API_KEY:}
      model-name: text-embedding-v2

# RAG 知识库：classpath:rag/*.md 启动时入库；管理员可 POST /api/admin/ai/rag/reindex 全量重建
ai:
  rag:
    enabled: true
    store: memory
    embedding-dimension: 1536
    redis-index-name: tennis_rag_kb
    max-retrieve-results: 5
    min-retrieve-score: 0.55
    max-segment-chars: 480
    segment-overlap-chars: 60
    load-on-startup: true
# AI 异步任务补偿（DEAD/FAILED 重投次数上限，含用户与管理员触发）
  chat:
    compensation:
      max-attempts: 5
